<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mainkan Mapel Dodge - Abbilefa Project</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Khusus agar game tampil penuh dan responsif */
        body { margin: 0; padding: 0; background-color: #080e1e; }
        .game-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <iframe 
            src=https://abbilefaproject-sketch.itch.io/mapel-dodge 
            allowfullscreen="" 
            frameborder="0">
        </iframe>
    </div>

</body>
</html>
