<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abbilefa Project - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGASI BAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" style="height: 40px; width: auto; display: block;">
                <defs>
                    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00bcd4" />
                        <stop offset="100%" stop-color="#0097a7" />
                    </linearGradient>
                </defs>
                <g transform="translate(10, 10)">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#cyberCyan)" stroke-width="3" stroke-dasharray="12 6" opacity="0.4"/>
                    <path d="M50 15 L80 80 L63 80 L50 50 L37 80 L20 80 Z" fill="url(#cyberCyan)" />
                    <circle cx="50" cy="15" r="4.5" fill="#ffffff" />
                </g>
                <text x="130" y="65" font-family="'Poppins', sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="1">
                    abbi<tspan fill="#00bcd4">lefa</tspan>
                </text>
                <text x="132" y="92" font-family="'Poppins', sans-serif" font-size="14" font-weight="600" fill="#a0a0a0" letter-spacing="6">
                    PROJECT
                </text>
            </svg>
        </a>
        
        <button class="hamburger" id="hamburger-btn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="navbar-nav" id="navbar-menu">
            <li class="nav-item"><a href="index.html" class="nav-link active">Home</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About Us</a></li>
            <!-- Link EDP ditambahkan -->
            <li class="nav-item"><a href="edp.html" class="nav-link">EDP</a></li>
            <li class="nav-item"><a href="project.html" class="nav-link">Project</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link">Contact Us</a></li>
        </ul>
    </nav>

    <!-- HERO SECTION (FOTO TIM BACKGROUND FULL SCREEN) -->
    <header class="hero-section">
        <h1 class="page-title" style="font-size: 3.5rem; margin-bottom: 1rem; font-weight: 800;">Selamat Datang di Abbilefa Project</h1>
        <p style="font-size: 1.2rem; color: #ffffff; margin-bottom: 2rem; max-width: 700px; margin-left: auto; margin-right: auto; opacity: 0.95; line-height: 1.8;">
            Membangun solusi digital inovatif dengan desain modern untuk masa depan yang lebih efisien.
        </p>
        <a href="project.html" class="btn">Jelajahi Project</a>
    </header>

    <!-- KONTEN BAWAH WEBSITE -->
    <div class="container">
        <section style="text-align: center; margin-bottom: 40px; margin-top: 60px;">
            <h2 style="color: var(--accent-color); font-size: 2rem; font-weight: 600;">Inovasi dalam Mengelompokkan Tugas</h2>
        </section>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        &copy; 2026 Abbilefa Project. Otw dipatenkan.
    </footer>

    <!-- SCRIPT INTERAKTIF NAVBAR -->
    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navbarMenu = document.getElementById('navbar-menu');

        hamburgerBtn.addEventListener('click', () => {
            navbarMenu.classList.toggle('active');
            hamburgerBtn.classList.toggle('active');
        });

        document.addEventListener('click', (event) => {
            if (!hamburgerBtn.contains(event.target) && !navbarMenu.contains(event.target)) {
                navbarMenu.classList.remove('active');
                hamburgerBtn.classList.remove('active');
            }
        });
    </script>
</body>
</html>
